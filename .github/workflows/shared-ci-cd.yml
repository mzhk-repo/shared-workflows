name: Shared CI/CD Pipeline (Dispatcher)

on:
  workflow_call:
    inputs:
      environment_name:
        description: 'Назва середовища (наприклад, production, development)'
        required: false
        type: string
        default: 'development'
      deploy:
        description: 'Чи запускати деплой (true/false)'
        required: false
        type: boolean
        default: true
      use_ansible:
        description: 'false: legacy compose path, true: swarm+sops path'
        required: false
        type: boolean
        default: false
      build_and_push_docker:
        description: 'Чи будувати і пушити Docker-образ у GHCR'
        required: false
        type: boolean
        default: false
      push_docker_image:
        description: 'Чи пушити Docker-образ навіть якщо deploy=false'
        required: false
        type: boolean
        default: false
      docker_image_name:
        description: 'Назва Docker-образу (наприклад, my-app)'
        required: false
        type: string
      orchestration_script_path:
        description: 'Опційний шлях до локального скрипта-оркестратора в репозиторії (виконується на сервері перед deploy)'
        required: false
        type: string
        default: 'scripts/deploy-orchestrator.sh'
      infra_repo_path:
        description: 'Шлях до Ansible інфраструктурного репозиторію на віддаленому сервері'
        required: false
        type: string
        default: '/opt/Ansible'
    secrets:
      TS_OAUTH_CLIENT_ID:
        required: false
      TS_OAUTH_SECRET:
        required: false
      SERVER_HOST:
        required: false
      SERVER_USER:
        required: false
      SERVER_SSH_KEY:
        required: false
      SERVER_SSH_PORT:
        required: false
      SSH_HOST_KEY_PUB:
        required: false
      DEPLOY_PROJECT_DIR:
        required: false
      INFRA_REPO_PAT:
        required: false
      SOPS_AGE_KEY:
        required: false
      ANSIBLE_VAULT_PASSWORD:
        required: false
      GHCR_PULL_USERNAME:
        required: false
      GHCR_PULL_TOKEN:
        required: false

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  legacy-compose:
    if: inputs.use_ansible == false
    uses: ./.github/workflows/shared-ci-cd-compose.yml
    with:
      environment_name: ${{ inputs.environment_name }}
      deploy: ${{ inputs.deploy }}
      build_and_push_docker: ${{ inputs.build_and_push_docker }}
      push_docker_image: ${{ inputs.push_docker_image }}
      docker_image_name: ${{ inputs.docker_image_name }}
      orchestration_script_path: ${{ inputs.orchestration_script_path }}
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
      SSH_HOST_KEY_PUB: ${{ secrets.SSH_HOST_KEY_PUB }}
      DEPLOY_PROJECT_DIR: ${{ secrets.DEPLOY_PROJECT_DIR }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}

  swarm-sops:
    if: inputs.use_ansible == true
    uses: ./.github/workflows/shared-ci-cd-swarm.yml
    with:
      environment_name: ${{ inputs.environment_name }}
      deploy: ${{ inputs.deploy }}
      build_and_push_docker: ${{ inputs.build_and_push_docker }}
      push_docker_image: ${{ inputs.push_docker_image }}
      docker_image_name: ${{ inputs.docker_image_name }}
      orchestration_script_path: ${{ inputs.orchestration_script_path }}
      infra_repo_path: ${{ inputs.infra_repo_path }}
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
      SSH_HOST_KEY_PUB: ${{ secrets.SSH_HOST_KEY_PUB }}
      DEPLOY_PROJECT_DIR: ${{ secrets.DEPLOY_PROJECT_DIR }}
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
